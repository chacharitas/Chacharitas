<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chacharitas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f6f6f6}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.05)
}
.logo{font-weight:700;color:#ff2e74;font-size:18px}

/* CATEGORÍAS */
.cat{
display:flex;
gap:8px;
padding:10px;
overflow-x:auto;
}
.cat button{
border:none;
padding:6px 12px;
border-radius:20px;
background:#eee;
font-size:12px
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px
}

.card{
background:#fff;
border-radius:14px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,.05)
}

.card img{width:100%;height:160px;object-fit:cover}

.info{padding:8px}
.price{color:#ff2e74;font-weight:bold}

.btn{
background:#ff2e74;
color:#fff;
border:none;
padding:7px;
border-radius:10px;
width:100%;
margin-top:5px
}

/* ADMIN */
.admin{
display:none;
background:#fff;
margin:10px;
padding:10px;
border-radius:10px
}

.input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc
}

/* CARRITO */
.cart{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-between;
padding:10px;
box-shadow:0 -2px 10px rgba(0,0,0,.1)
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🛍️ Chacharitas</div>
<button onclick="login()">Admin</button>
</div>

<div class="cat">
<button onclick="filter('all')">Todo</button>
<button onclick="filter('moda')">Moda</button>
<button onclick="filter('hogar')">Hogar</button>
<button onclick="filter('deportes')">Deportes</button>
<button onclick="filter('tendencias')">Tendencias</button>
<button onclick="filter('viral')">Viral</button>
</div>

<div class="grid" id="products"></div>

<!-- ADMIN -->
<div class="admin" id="admin">
<h3>Panel Admin</h3>

<input id="name" class="input" placeholder="Nombre">
<input id="price" class="input" placeholder="Precio">
<input id="img" class="input" placeholder="Link de imagen">
<select id="cat" class="input">
<option value="moda">Moda</option>
<option value="hogar">Hogar</option>
<option value="deportes">Deportes</option>
<option value="tendencias">Tendencias</option>
<option value="viral">Viral</option>
</select>

<button class="btn" onclick="addProduct()">Agregar producto</button>

<h3>Productos</h3>
<div id="adminProducts"></div>
</div>

<!-- CARRITO -->
<div class="cart">
<div>🛒 $<span id="total">0</span></div>
<button class="btn" onclick="checkout()">Comprar</button>
</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
 apiKey:"AIzaSy...",
 authDomain:"chacharitasstore.firebaseapp.com",
 projectId:"chacharitasstore"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart=[];
let currentCat="all";

// 📦 CARGAR PRODUCTOS
async function loadProducts(){
 let snap = await db.collection("products").get();
 let html='';

 snap.forEach(doc=>{
  let p = doc.data();

  if(currentCat!="all" && p.cat!=currentCat) return;

  html+=`
  <div class="card">
   <img src="${p.img}">
   <div class="info">
    <div>${p.name}</div>
    <div class="price">$${p.price}</div>
    <button class="btn" onclick="addCart('${p.name}',${p.price})">Agregar</button>
   </div>
  </div>`;
 });

 document.getElementById("products").innerHTML=html;
}

// 🛒 CARRITO
function addCart(n,p){
 cart.push({n,p});
 document.getElementById("total").innerText =
 cart.reduce((a,b)=>a+b.p,0);
}

// 💳 COMPRA (WHATSAPP)
function checkout(){
 let envio = confirm("¿Entrega local? Cancelar = envío +$80");
 let envioCosto = envio ? 0 : 80;

 let total = cart.reduce((a,b)=>a+b.p,0)+envioCosto;

 let txt = cart.map(x=>`- ${x.n} $${x.p}`).join("%0A");

 let msg=`Pedido:%0A${txt}%0ATotal:$${total}`;

 window.open(`https://wa.me/5214921263187?text=${msg}`);

 cart=[];
 document.getElementById("total").innerText=0;
}

// ➕ AGREGAR PRODUCTO
async function addProduct(){
 let name=name.value;
 let price=parseInt(price.value);
 let img=img.value;
 let cat=cat.value;

 await db.collection("products").add({name,price,img,cat});

 loadProducts();
 loadAdminProducts();
}

// 🔐 ADMIN
function login(){
 let pass=prompt("Clave admin");
 if(pass==="1234"){
  document.getElementById("admin").style.display="block";
  loadAdminProducts();
 }
}

// 🛠️ ADMIN PRODUCTOS
async function loadAdminProducts(){
 let snap=await db.collection("products").get();
 let html='';

 snap.forEach(doc=>{
  let p=doc.data();

  html+=`
  <div>
  ${p.name} $${p.price}
  <button onclick="deleteP('${doc.id}')">❌</button>
  </div>`;
 });

 document.getElementById("adminProducts").innerHTML=html;
}

// ❌ ELIMINAR
async function deleteP(id){
 await db.collection("products").doc(id).delete();
 loadProducts();
 loadAdminProducts();
}

// 🔍 FILTRO
function filter(cat){
 currentCat=cat;
 loadProducts();
}

// 🚀 INIT
loadProducts();

</script>

</body>
</html>
