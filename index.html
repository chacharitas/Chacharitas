<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chacharitas Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
body{font-family:sans-serif;background:#fafafa;margin:0}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;padding:10px;border-radius:10px}
.btn{background:#ff3e7f;color:#fff;border:none;padding:8px;border-radius:8px;width:100%}
</style>
</head>

<body>

<h2 style="padding:10px">🛍️ Chacharitas</h2>

<div class="grid" id="products"></div>

<div style="padding:10px">
<input id="name" placeholder="Nombre">
<input id="price" placeholder="Precio">
<input id="img" placeholder="Imagen URL">
<button class="btn" onclick="addProduct()">Agregar</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_hpSH4b8pcrOXSvwe62CGYgBrPFdXalo",
  authDomain: "chacharitasstore.firebaseapp.com",
  projectId: "chacharitasstore"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function loadProducts(){
 let snap = await db.collection("products").get();
 let html='';
 snap.forEach(doc=>{
  let p = doc.data();
  html+=`
  <div class="card">
   <img src="${p.img}" width="100%">
   <h4>${p.name}</h4>
   <b>$${p.price}</b>
  </div>`;
 });
 document.getElementById("products").innerHTML=html;
}

async function addProduct(){
 let name=document.getElementById("name").value;
 let price=parseInt(document.getElementById("price").value);
 let img=document.getElementById("img").value;

 await db.collection("products").add({name,price,img});
 loadProducts();
}

loadProducts();
</script>

</body>
</html>
