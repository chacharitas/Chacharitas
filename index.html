<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chacharitas</title>

<style>
:root{--pink:#e91e63;--bg:#fff0f5;}
body{font-family:Arial;margin:0;background:var(--bg);}
.header{background:#fff;padding:10px;display:flex;gap:10px;align-items:center}
.logo{color:var(--pink);font-weight:bold}
.search{flex:1;padding:8px;border-radius:20px;border:1px solid #ccc}
.cat{display:flex;gap:6px;padding:10px}
.cat button{border:none;padding:6px 10px;border-radius:10px;background:#eee}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;border-radius:15px;overflow:hidden}
.card img{width:100%;height:150px;object-fit:cover}
.info{padding:8px}
.price{color:var(--pink);font-weight:bold}
.btn{background:var(--pink);color:#fff;border:none;padding:6px;border-radius:10px;width:100%}
.input{width:100%;padding:8px;margin-top:5px;border-radius:10px;border:1px solid #ccc}
.bottom{position:fixed;bottom:0;width:100%;background:#fff;padding:10px}
</style>
</head>

<body>

<div class="header">
<div class="logo">🛍️ Chacharitas</div>
<input class="search" placeholder="Buscar..." onkeyup="search(this.value)">
</div>

<div class="cat">
<button onclick="filterCat('all')">Todo</button>
<button onclick="filterCat('ropa')">Ropa</button>
<button onclick="filterCat('hogar')">Hogar</button>
<button onclick="filterCat('viral')">Viral</button>
</div>

<div class="grid" id="products"></div>

<div style="padding:10px">
<h3>➕ Agregar producto</h3>
<input id="pname" class="input" placeholder="Nombre">
<input id="pprice" class="input" placeholder="Precio">
<input id="pimg" class="input" placeholder="Link imagen">
<select id="pcat" class="input">
<option value="ropa">Ropa</option>
<option value="hogar">Hogar</option>
<option value="viral">Viral</option>
</select>
<button class="btn" onclick="addProduct()">Agregar</button>

<h3>📦 Datos cliente</h3>
<input id="name" class="input" placeholder="Nombre">
<input id="addr" class="input" placeholder="Dirección">
<input id="phone" class="input" placeholder="Teléfono">

<h3>🧾 Pedidos</h3>
<div id="orders"></div>
</div>

<div class="bottom">
Total: $<span id="total">0</span>
<button class="btn" onclick="buy()">Comprar</button>
</div>

<script>

// 🔥 PRODUCTOS (se guardan en el celular)
let products = JSON.parse(localStorage.getItem('products')) || [
 {name:'Blusa floral', price:199, cat:'ropa', img:'https://via.placeholder.com/200'},
 {name:'Organizador maquillaje', price:149, cat:'hogar', img:'https://via.placeholder.com/200'},
 {name:'Luz LED espejo', price:199, cat:'viral', img:'https://via.placeholder.com/200'}
];

let cart = [];
let orders = JSON.parse(localStorage.getItem('orders')) || [];
let currentCat = 'all';

// 🛍️ MOSTRAR PRODUCTOS
function render(list=products){
 let c=document.getElementById('products');
 c.innerHTML='';
 list.filter(p=>currentCat==='all'||p.cat===currentCat).forEach(p=>{
  c.innerHTML+=`
  <div class="card">
   <img src="${p.img}">
   <div class="info">
    <div>${p.name}</div>
    <div class="price">$${p.price}</div>
    <button class="btn" onclick="add('${p.name}',${p.price},'${p.cat}')">Agregar</button>
   </div>
  </div>`;
 });
}

// 🔍 FILTRO
function filterCat(cat){currentCat=cat;render();}
function search(t){
 render(products.filter(p=>p.name.toLowerCase().includes(t.toLowerCase())))
}

// ➕ AGREGAR AL CARRITO
function add(n,p,c){
 cart.push({n,p,c});
 update();
 recommend(c);
}

// 💰 TOTAL
function update(){
 document.getElementById('total').innerText = cart.reduce((s,x)=>s+x.p,0);
}

// 🤖 RECOMENDACIÓN
function recommend(cat){
 let similares = products.filter(p=>p.cat===cat);
 if(similares.length){
  let r = similares[Math.floor(Math.random()*similares.length)];
  setTimeout(()=>alert('😍 También te puede gustar: '+r.name),800);
 }
}

// 🧠 PANEL AGREGAR PRODUCTO
function addProduct(){
 let name = document.getElementById('pname').value;
 let price = document.getElementById('pprice').value;
 let img = document.getElementById('pimg').value;
 let cat = document.getElementById('pcat').value;

 if(!name || !price || !img){
  alert('Completa todo');
  return;
 }

 let newProduct = {name, price:parseInt(price), img, cat};
 products.push(newProduct);

 localStorage.setItem('products', JSON.stringify(products));

 render();

 alert('Producto agregado 😍');
}

// 🧾 CREAR PEDIDO
function buy(){
 let n=document.getElementById('name').value;
 let a=document.getElementById('addr').value;
 let t=document.getElementById('phone').value;

 let txt='';
 cart.forEach(x=>txt+=`- ${x.n} $${x.p} `);

 let order = {txt,total:document.getElementById('total').innerText,n,a,t,status:'pendiente'};

 orders.push(order);
 localStorage.setItem('orders',JSON.stringify(orders));

 renderOrders();

 let msg=`Pedido:%0A${txt}%0ATotal:$${order.total}%0A${n}%0A${a}%0A${t}`;
 window.open(`https://wa.me/5214921263187?text=${msg}`);

 cart=[];update();
}

// 📦 MOSTRAR PEDIDOS
function renderOrders(){
 let el=document.getElementById('orders');
 el.innerHTML='';
 orders.forEach((o,i)=>{
  el.innerHTML+=`
  <div>
   ${o.txt} | $${o.total} (${o.status})
  </div>`;
 });
}

// 🚀 INICIO
render();
renderOrders();

</script>

</body>
 </html>
