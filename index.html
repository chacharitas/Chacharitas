<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chacharitas</title>

<style>
:root{--pink:#e91e63;--bg:#fff0f5;}
body{font-family:Arial;margin:0;background:var(--bg);}
.header{position:sticky;top:0;background:#fff;padding:10px;display:flex;gap:10px;align-items:center}
.logo{color:var(--pink);font-weight:bold;font-size:18px}
.search{flex:1;padding:8px;border-radius:20px;border:1px solid #ccc}
.cat{display:flex;gap:6px;overflow:auto;padding:8px}
.cat button{border:none;padding:6px 10px;border-radius:10px;background:#eee}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;border-radius:15px;overflow:hidden}
.card img{width:100%;height:150px;object-fit:cover}
.info{padding:8px}
.price{color:var(--pink);font-weight:bold}
.btn{background:var(--pink);color:#fff;border:none;padding:6px;border-radius:10px;width:100%}
.bottom{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;box-shadow:0 -2px 6px rgba(0,0,0,.1)}
.input{width:100%;padding:8px;margin-top:5px;border-radius:10px;border:1px solid #ccc}
.status{font-size:11px;padding:2px 6px;border-radius:8px}
.p{background:#ffe082}.e{background:#81d4fa}.t{background:#a5d6a7}
</style>
</head>

<body>

<div class="header">
<div class="logo">🛍️ Chacharitas</div>
<input class="search" placeholder="Buscar..." onkeyup="search(this.value)">
</div>

<div class="cat">
<button onclick="filterCat('all')">Todo</button>
<button onclick="filterCat('ropa')">Ropa</button>
<button onclick="filterCat('hogar')">Hogar</button>
<button onclick="filterCat('viral')">Viral</button>
</div>

<div class="grid" id="products"></div>

<div style="padding:10px">
<h3>📦 Datos</h3>
<input id="name" class="input" placeholder="Nombre">
<input id="addr" class="input" placeholder="Dirección">
<input id="phone" class="input" placeholder="Teléfono">

<h3>🚚 Envío</h3>
<select id="envio" class="input">
<option value="Entrega local">Entrega local</option>
<option value="Envío $80">Envío $80</option>
</select>

<h3>🧾 Pedidos</h3>
<div id="orders"></div>
</div>

<div class="bottom">
Total: $<span id="total">0</span>
<button class="btn" onclick="buy()">Comprar</button>
</div>

<script>
let products = [
 {name:'Blusa floral', price:199, cat:'ropa', img:'https://via.placeholder.com/200'},
 {name:'Vestido casual', price:349, cat:'ropa', img:'https://via.placeholder.com/200'},
 {name:'Organizador maquillaje', price:149, cat:'hogar', img:'https://via.placeholder.com/200'},
 {name:'Luz LED espejo', price:199, cat:'viral', img:'https://via.placeholder.com/200'}
];

let cart = [];
let orders = JSON.parse(localStorage.getItem('orders')) || [];
let currentCat = 'all';

function render(list=products){
 let c=document.getElementById('products');
 c.innerHTML='';
 list.filter(p=>currentCat==='all'||p.cat===currentCat).forEach(p=>{
  c.innerHTML+=`
  <div class="card">
   <img src="${p.img}">
   <div class="info">
    <div>${p.name}</div>
    <div class="price">$${p.price}</div>
    <button class="btn" onclick="add('${p.name}',${p.price},'${p.cat}')">Agregar</button>
   </div>
  </div>`;
 });
}

function filterCat(cat){currentCat=cat;render();}
function search(t){render(products.filter(p=>p.name.toLowerCase().includes(t.toLowerCase())))}

function add(n,p,c){
 cart.push({n,p,c});
 update();
 recommend(c);
}

function update(){
 document.getElementById('total').innerText = cart.reduce((s,x)=>s+x.p,0);
}

function recommend(cat){
 let similares = products.filter(p=>p.cat===cat);
 if(similares.length){
  let r = similares[Math.floor(Math.random()*similares.length)];
  setTimeout(()=>alert('😍 También te puede gustar: '+r.name),1000);
 }
}

function build(){
 let n=document.getElementById('name').value;
 let a=document.getElementById('addr').value;
 let t=document.getElementById('phone').value;
 let envio=document.getElementById('envio').value;

 let txt='';
 cart.forEach(x=>txt+=`- ${x.n} $${x.p} `);

 return {txt,total:document.getElementById('total').innerText,n,a,t,envio};
}

function buy(){
 let o=build();

 orders.push({...o,status:'pendiente'});
 localStorage.setItem('orders',JSON.stringify(orders));

 notify('Nuevo pedido 🛍️');
 renderOrders();

 let msg=`Pedido:%0A${o.txt}%0ATotal:$${o.total}%0A${o.n}%0A${o.a}%0A${o.t}`;
 window.open(`https://wa.me/5214921263187?text=${msg}`);

 cart=[];update();
}

function renderOrders(){
 let el=document.getElementById('orders');
 el.innerHTML='';
 orders.forEach((o,i)=>{
  el.innerHTML+=`
  <div>
   ${o.txt} | $${o.total}
   <span class="status ${o.status==='pendiente'?'p':o.status==='enviado'?'e':'t'}">${o.status}</span>
   <button onclick="setStatus(${i},'enviado')">Enviar</button>
   <button onclick="setStatus(${i},'entregado')">OK</button>
  </div>`;
 });
}

function setStatus(i,s){
 orders[i].status=s;
 localStorage.setItem('orders',JSON.stringify(orders));
 renderOrders();
}

// 🔔 NOTIFICACIONES
function notify(text){
 if(Notification.permission==='granted'){
  new Notification(text);
 } else {
  Notification.requestPermission();
 }
}

render();
renderOrders();
</script>

</body>
  </html>
