<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chacharitas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f5f5f5}

/* HEADER */
.header{
display:flex;
flex-direction:column;
padding:10px;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.05)
}
.top{
display:flex;
justify-content:space-between;
align-items:center
}
.logo{color:#ff2e74;font-weight:700}
.search{
margin-top:8px;
padding:10px;
border-radius:20px;
border:1px solid #ddd;
width:100%
}

/* CATEGORÍAS */
.cat{
display:flex;
gap:8px;
padding:10px;
overflow-x:auto
}
.cat button{
border:none;
padding:6px 12px;
border-radius:20px;
background:#eee
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px
}

.card{
background:#fff;
border-radius:14px;
overflow:hidden;
transform:scale(.95);
opacity:0;
animation:fade .4s forwards;
}

@keyframes fade{
to{opacity:1;transform:scale(1)}
}

.card img{width:100%;height:160px;object-fit:cover}
.info{padding:8px}
.price{color:#ff2e74;font-weight:bold}

.btn{
background:#ff2e74;
color:#fff;
border:none;
padding:7px;
border-radius:10px;
width:100%;
margin-top:5px
}

/* CART */
.cart{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-between;
padding:10px;
box-shadow:0 -2px 10px rgba(0,0,0,.1)
}

/* ADMIN */
.admin{display:none;background:#fff;margin:10px;padding:10px;border-radius:10px}
.input{width:100%;padding:8px;margin-top:5px}
</style>
</head>

<body>

<div class="header">
<div class="top">
<div class="logo">🛍️ Chacharitas</div>
<button onclick="login()">Admin</button>
</div>
<input class="search" placeholder="Buscar productos..." onkeyup="search(this.value)">
</div>

<div class="cat">
<button onclick="filter('all')">Todo</button>
<button onclick="filter('moda')">Moda</button>
<button onclick="filter('hogar')">Hogar</button>
<button onclick="filter('deportes')">Deportes</button>
<button onclick="filter('tendencias')">Tendencias</button>
<button onclick="filter('viral')">Viral</button>
</div>

<div class="grid" id="products"></div>

<!-- ADMIN -->
<div class="admin" id="admin">
<h3>Panel Admin</h3>
<input id="name" class="input" placeholder="Nombre">
<input id="price" class="input" placeholder="Precio">
<input id="img" class="input" placeholder="Link imagen">
<select id="cat">
<option value="moda">Moda</option>
<option value="hogar">Hogar</option>
<option value="deportes">Deportes</option>
<option value="tendencias">Tendencias</option>
<option value="viral">Viral</option>
</select>
<button class="btn" onclick="addProduct()">Agregar</button>

<h3>Pedidos</h3>
<div id="orders"></div>
</div>

<div class="cart">
<div>🛒 $<span id="total">0</span></div>
<button class="btn" onclick="checkout()">Comprar</button>
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"chacharitasstore.firebaseapp.com",
projectId:"chacharitasstore"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let cart=[];
let currentCat="all";
let allProducts=[];

// 🔥 CARGAR
async function loadProducts(){
let snap=await db.collection("products").get();
allProducts=[];
snap.forEach(doc=>allProducts.push(doc.data()));
render(allProducts);
}

// 🎨 RENDER
function render(list){
let html='';
list.forEach(p=>{
 if(currentCat!="all" && p.cat!=currentCat) return;

 html+=`
 <div class="card">
 <img src="${p.img}">
 <div class="info">
 <div>${p.name}</div>
 <div class="price">$${p.price}</div>
 <button class="btn" onclick="addCart('${p.name}',${p.price},'${p.cat}')">Agregar</button>
 </div>
 </div>`;
});
document.getElementById("products").innerHTML=html;
}

// 🔍 BUSCADOR
function search(txt){
let f=allProducts.filter(p=>p.name.toLowerCase().includes(txt.toLowerCase()));
render(f);
}

// 🛒 CARRITO
function addCart(n,p,c){
cart.push({n,p,c});
update();
recommend(c);
}

// 💰 TOTAL
function update(){
document.getElementById("total").innerText=
cart.reduce((a,b)=>a+b.p,0);
}

// 🤖 RECOMENDACIONES
function recommend(cat){
let r=allProducts.filter(p=>p.cat==cat);
if(r.length){
let p=r[Math.floor(Math.random()*r.length)];
setTimeout(()=>alert("🔥 También te puede gustar: "+p.name),600);
}
}

// 💳 COMPRA + PEDIDO
async function checkout(){
let envio=confirm("¿Entrega local? Cancelar = envío +$80");
let envioCosto=envio?0:80;

let total=cart.reduce((a,b)=>a+b.p,0)+envioCosto;
let txt=cart.map(x=>`- ${x.n} $${x.p}`).join("%0A");

await db.collection("orders").add({txt,total});

window.open(`https://wa.me/5214921263187?text=Pedido:%0A${txt}%0ATotal:$${total}`);

cart=[];update();
}

// ➕ PRODUCTO
async function addProduct(){
await db.collection("products").add({
name:name.value,
price:parseInt(price.value),
img:img.value,
cat:cat.value
});
loadProducts();
}

// 🔐 ADMIN
function login(){
let p=prompt(3312);
if(p==="1234"){
admin.style.display="block";
loadOrders();
}
}

// 📦 PEDIDOS
async function loadOrders(){
let snap=await db.collection("orders").get();
let html='';
snap.forEach(doc=>{
let o=doc.data();
html+=`<div>${o.txt} | $${o.total}</div>`;
});
orders.innerHTML=html;
}

// 🔍 FILTRO
function filter(c){
currentCat=c;
render(allProducts);
}

loadProducts();

</script>

</body>
</html>
